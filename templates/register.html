{% extends 'base.html' %}

{% block title %}SecureVault - Agent Registration{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-panel auth-card">
        <h2 class="auth-title"><i class="fa-solid fa-user-plus" style="color: var(--accent-cyan);"></i> Establish Operative</h2>
        <p class="auth-subtitle">Register credentials to initialize secure database tables</p>
        
        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Minimum 4 characters" minlength="4" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 8 characters" minlength="8" required autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter password" minlength="8" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-cyan" style="width: 100%; margin-top: 1.5rem;">
                <i class="fa-solid fa-key"></i> Initialize Credentials
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already registered? <a href="{{ url_for('auth.login') }}">Access workspace</a></p>
        </div>
    </div>
</div>
{% endblock %}
